services:
  mysql:
    image: mysql:8.4
    container_name: xunji-mysql
    network_mode: host
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-xunji_root_password}
      MYSQL_DATABASE: ${DB_NAME:-xunji}
      MYSQL_USER: ${DB_USER:-xunji}
      MYSQL_PASSWORD: ${DB_PASSWORD:-xunji_password}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ../../backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../backend/sql/seed-demo.sql:/docker-entrypoint-initdb.d/02-seed-demo.sql:ro

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: xunji-minio
    network_mode: host
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --address ":9000" --console-address ":9001"
    volumes:
      - minio-data:/data

  ai-service:
    image: xunji/ai-service:local
    container_name: xunji-ai-service
    network_mode: host
    restart: unless-stopped

  backend:
    image: xunji/backend:local
    container_name: xunji-backend
    network_mode: host
    restart: unless-stopped
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-xunji}
      DB_USER: ${DB_USER:-xunji}
      DB_PASSWORD: ${DB_PASSWORD:-xunji_password}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      AI_SERVICE_BASE_URL: http://127.0.0.1:5000
      MINIO_ENDPOINT: 127.0.0.1:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-xunji}
      MINIO_SECURE: "false"
      TZ: Asia/Shanghai
    depends_on:
      - mysql
      - ai-service
      - minio

  user-web:
    image: xunji/user-web:local
    container_name: xunji-user-web
    network_mode: host
    restart: unless-stopped
    command: >
      sh -c "sed -i 's/listen 80;/listen 18080;/' /etc/nginx/conf.d/default.conf
      && sed -i 's|http://backend:8080/api/|http://127.0.0.1:8080/api/|' /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"
    depends_on:
      - backend

  admin-web:
    image: xunji/admin-web:local
    container_name: xunji-admin-web
    network_mode: host
    restart: unless-stopped
    command: >
      sh -c "sed -i 's/listen 80;/listen 18081;/' /etc/nginx/conf.d/default.conf
      && sed -i 's|http://backend:8080/api/|http://127.0.0.1:8080/api/|' /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"
    depends_on:
      - backend

volumes:
  mysql-data:
  minio-data:
