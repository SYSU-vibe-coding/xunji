services:
  mysql:
    image: mysql:8.4
    container_name: xunji-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:?DB_NAME is required}
      MYSQL_USER: ${DB_USER:?DB_USER is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: xunji-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  ai-service:
    build:
      context: ../..
      dockerfile: ai-service/Dockerfile
    image: xunji/ai-service:local
    container_name: xunji-ai-service
    restart: unless-stopped
    environment:
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-local-compose-ai-service-token-change-me}
      AI_ALLOWED_IMAGE_HOSTS: ${AI_ALLOWED_IMAGE_HOSTS:-}
      AI_TRUSTED_PRIVATE_IMAGE_HOSTS: ${AI_TRUSTED_PRIVATE_IMAGE_HOSTS:-minio}
      AI_LOCAL_DEV_MODE: "false"
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/api/v1}
      LLM_MODEL: ${LLM_MODEL:-}
      TEXT_EMBEDDING_MODEL: ${TEXT_EMBEDDING_MODEL:-}
      DASHSCOPE_TIMEOUT: ${DASHSCOPE_TIMEOUT:-8.0}
    ports:
      - "127.0.0.1:${AI_SERVICE_PORT:-5000}:5000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    image: xunji/backend:local
    container_name: xunji-backend
    restart: unless-stopped
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8080",
      ]
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-false}
      ADMIN_ACCOUNT: ${ADMIN_ACCOUNT:?ADMIN_ACCOUNT is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      ADMIN_PHONE: ${ADMIN_PHONE:?ADMIN_PHONE is required}
      DEBUG: ${DEBUG:-false}
      SMS_DEBUG_ENABLED: ${SMS_DEBUG_ENABLED:-false}
      SMS_DEMO_PHONES: ${SMS_DEMO_PHONES:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:18080,http://localhost:18080,http://127.0.0.1:18081,http://localhost:18081}
      AI_SERVICE_BASE_URL: ${AI_SERVICE_BASE_URL:-http://ai-service:5000}
      AI_SERVICE_TIMEOUT: ${AI_SERVICE_TIMEOUT:-3.0}
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-local-compose-ai-service-token-change-me}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-xunji}
      MINIO_SECURE: "false"
      # Browser-only signing endpoint. AI receives a separate minio:9000 short URL.
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-http://127.0.0.1:9000}
      MINIO_URL_EXPIRE_HOURS: ${MINIO_URL_EXPIRE_HOURS:-168}
      MINIO_SENSITIVE_EXPIRE_HOURS: ${MINIO_SENSITIVE_EXPIRE_HOURS:-1}
      MINIO_AI_URL_EXPIRE_MINUTES: ${MINIO_AI_URL_EXPIRE_MINUTES:-10}
      MINIO_MAX_IMAGE_PIXELS: ${MINIO_MAX_IMAGE_PIXELS:-25000000}
      MATCH_AUTO_INTERVAL_MINUTES: ${MATCH_AUTO_INTERVAL_MINUTES:-0}
      MATCH_RECALCULATE_MAX_CANDIDATES: ${MATCH_RECALCULATE_MAX_CANDIDATES:-100}
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  user-web:
    build:
      context: ../..
      dockerfile: frontend/user-app/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    image: xunji/user-web:local
    container_name: xunji-user-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${USER_WEB_PORT:-18080}:80"

  admin-web:
    build:
      context: ../..
      dockerfile: frontend/admin-web/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    image: xunji/admin-web:local
    container_name: xunji-admin-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${ADMIN_WEB_PORT:-18081}:80"

volumes:
  mysql-data:
  minio-data:
