services:
  xunji-user-web:
    build:
      context: ../../frontend
      dockerfile: user-app/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    image: xunji/user-web:local
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-http://host.docker.internal:8080}
    ports:
      - "${USER_WEB_PORT:-18080}:80"

  xunji-admin-web:
    build:
      context: ../../frontend
      dockerfile: admin-web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    image: xunji/admin-web:local
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-http://host.docker.internal:8080}
    ports:
      - "${ADMIN_WEB_PORT:-18081}:80"
