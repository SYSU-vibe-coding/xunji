server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  # Application code enforces a 20 MB image limit; allow multipart overhead.
  client_max_body_size 22m;

  # Re-resolve upstream DNS at request time, not at nginx startup, so backend
  # container restarts (which change its IP) don't permanently break the proxy.
  # The nameserver is injected at container start from /etc/resolv.conf
  # (see docker-entrypoint augmentation in Dockerfile).
  resolver __DNS_RESOLVER__ ipv6=off valid=10s;

  location /api/ {
    set $upstream_backend "__BACKEND_UPSTREAM__";
    proxy_pass $upstream_backend$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
